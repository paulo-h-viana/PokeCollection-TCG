  <line x1="62" y1="50" x2="95" y2="50" stroke="#222222" stroke-width="4"/>
  <!-- Botão central — anel preto -->
  <circle cx="50" cy="50" r="13" fill="#222222"/>
  <!-- Botão central — preenchimento branco -->
